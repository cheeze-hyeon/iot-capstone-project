<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>알록 리필 스테이션</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #F2F4F6;
    color: #191F28;
  }
  #app {
    width: 100%;
    max-width: 480px;
    height: 100%;
    max-height: 800px;
    display: flex;
    flex-direction: column;
    padding: 2rem 1.5rem;
    background: #fff;
    border-radius: 1.5rem;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    position: relative;
  }
  h1 {
    font-size: 1.2rem; margin: 0 0 1.5rem; text-align: center;
    color: #191F28; font-weight: 800;
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  }
  .restart-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: #F2F4F6;
    color: #8B95A1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .restart-btn:hover { background: #E5E8EB; color: #4E5968; }
  .restart-btn:active { transform: rotate(180deg); }
  .screen { flex: 1; display: flex; flex-direction: column; }

  /* 아이콘 */
  .icon-sm { width: 18px; height: 18px; }
  .icon-md { width: 28px; height: 28px; }
  .icon-lg { width: 56px; height: 56px; }
  .icon-xl { width: 72px; height: 72px; }

  /* 제품 선택 */
  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
    flex: 1;
  }
  .product-card {
    background: #F9FAFB;
    border: 2px solid transparent;
    border-radius: 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    padding: 1.2rem;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .product-card:active { transform: scale(0.97); border-color: #3182F6; }
  .product-icon-bg {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .product-name { font-weight: 700; }
  .product-price { color: #8B95A1; font-size: 0.85rem; }

  /* 진행 단계 표시 */
  .step-bar { margin-bottom: 1.5rem; }
  .step-label { font-size: 0.8rem; font-weight: 800; color: #3182F6; margin-bottom: 0.6rem; letter-spacing: 0.02em; }
  .step-label .step-total { color: #8B95A1; font-weight: 700; }
  .step-track { height: 6px; background: #F2F4F6; border-radius: 999px; overflow: hidden; }
  .step-fill { height: 100%; background: #3182F6; border-radius: 999px; transition: width 0.3s; }

  /* 선택된 제품 칩 */
  .product-chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.45rem 1rem; border-radius: 999px;
    font-weight: 700; font-size: 0.9rem; margin-bottom: 1.2rem;
  }

  /* 환영 메시지 */
  .welcome { font-size: 1.7rem; font-weight: 800; line-height: 1.35; margin-bottom: 0.4rem; color: #191F28; }
  .welcome-name { color: #3182F6; }
  .welcome-sub { color: #8B95A1; font-size: 1rem; margin-bottom: 1.5rem; font-weight: 500; }

  /* 공통: 안내문 / 큰 숫자 */
  .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .guide { font-size: 1.3rem; color: #191F28; margin-bottom: 1.2rem; line-height: 1.6; font-weight: 700; }
  .guide b { color: #3182F6; }
  .big-number { font-size: 4.5rem; font-weight: 800; margin: 0.5rem 0; color: #191F28; }
  .unit { font-size: 1.4rem; color: #8B95A1; font-weight: 600; }
  .sub { color: #8B95A1; margin-top: 0.4rem; }

  .badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-top: 1.2rem; padding: 0.5rem 1.2rem;
    border-radius: 2rem; font-weight: 700; font-size: 0.9rem;
  }
  .badge-idle { background: #FFF0F0; color: #F04452; }
  .badge-ready { background: #EFF6FF; color: #3182F6; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .dot-red { background: #F04452; }
  .dot-blue { background: #3182F6; }

  .stable { color: #3182F6; }
  .unstable { color: #FF9F40; }

  /* 버튼 */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 1.1rem;
    margin-top: 1rem;
    border: none;
    border-radius: 1rem;
    font-size: 1.05rem;
    font-weight: 700;
    background: #3182F6;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:active { background: #2272EB; }
  .btn-secondary { background: #F2F4F6; color: #4E5968; }
  .btn-secondary:active { background: #E5E8EB; }

  /* 결제 화면 */
  .receipt { background: #F9FAFB; border-radius: 1.2rem; padding: 1.5rem; width: 100%; }
  .receipt-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; color: #4E5968; }
  .receipt-row span:first-child { display: flex; align-items: center; gap: 0.5rem; }
  .receipt-total { display: flex; justify-content: space-between; padding-top: 0.8rem; margin-top: 0.8rem; border-top: 1px solid #E5E8EB; font-size: 1.3rem; font-weight: 800; color: #191F28; }

  /* 완료 화면 */
  .eco-amount { font-size: 2.4rem; font-weight: 800; color: #00C896; margin: 0.5rem 0; }
</style>
</head>
<body>
<div id="app">
  <button class="restart-btn" onclick="restartServer()" title="서버 재시작">
    <i data-lucide="rotate-cw" class="icon-sm"></i>
  </button>
  <h1><i data-lucide="recycle" class="icon-sm" style="color:#3182F6"></i> 알록 리필 스테이션</h1>
  <div id="screen" class="screen"></div>
</div>

<script>
  const PRODUCTS = [
    { id: "detergent", name: "세탁 세제",   icon: "shirt",           color: "#3182F6", bg: "#E8F3FF", pricePerGram: 15, co2PerGram: 0.08 },
    { id: "softener",  name: "섬유 유연제", icon: "wind",            color: "#FF6B9E", bg: "#FFEEF3", pricePerGram: 12, co2PerGram: 0.07 },
    { id: "shampoo",   name: "샴푸",        icon: "droplet",         color: "#8B5CF6", bg: "#F3F0FF", pricePerGram: 20, co2PerGram: 0.09 },
    { id: "dish",      name: "주방 세제",   icon: "utensils-crossed",color: "#1FC875", bg: "#E8FBF3", pricePerGram: 13, co2PerGram: 0.06 },
  ];

  // 카드 UID -> 회원 이름 (예시 데이터)
  const MEMBERS = {
    "BB1CAA00": "최주현",
  };

  // 화면별 진행 단계 표시
  const STEPS = {
    CARD:     { n: 1, label: "회원 확인" },
    SELECT:   { n: 2, label: "제품 선택" },
    PLACE:    { n: 3, label: "용기 준비" },
    REFILL:   { n: 4, label: "리필" },
    CHECKOUT: { n: 5, label: "결제" },
    DONE:     { n: 6, label: "완료" },
  };
  const STEP_TOTAL = 6;

  let screen = "CARD"; // CARD, SELECT, PLACE, REFILL, CHECKOUT, DONE
  let product = null;
  let memberName = null;
  let latest = {};       // 최신 WebSocket 상태
  let finalRefill = 0;   // "리필 완료" 시점에 캡쳐된 리필량(g)

  const screenEl = document.getElementById("screen");
  let ws;

  function connect() {
    ws = new WebSocket("ws://localhost:8765");
    ws.onopen = () => {
      ws.send(JSON.stringify({ action: "reset" }));
    };
    ws.onclose = () => setTimeout(connect, 1000);
    ws.onerror = () => ws.close();
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      // 물리 버튼: READY 상태에서 다시 누르면 "리필 완료" 신호
      if (data.event === "REFILL_DONE") {
        if (screen === "REFILL") {
          finalRefill = Math.max(0, latest.refill ?? 0);
          screen = "CHECKOUT";
          render();
        }
        return;
      }

      // 카드 태그 -> 환영 메시지 + 제품 선택 화면으로 전환
      if (data.event === "CARD_TAGGED") {
        if (screen === "CARD") {
          memberName = MEMBERS[data.uid] || "고객";
          screen = "SELECT";
          render();
        }
        return;
      }

      latest = data;

      // 1단계 -> 2단계: 버튼이 눌려 서버 상태가 READY로 바뀌면 자동 전환
      if (screen === "PLACE" && latest.state === "READY") {
        screen = "REFILL";
      }
      render();
    };
  }

  function sendReset() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: "reset" }));
    }
  }

  function restartServer() {
    if (!confirm("서버를 재시작할까요? (저울/아두이노 연결이 잠시 끊겼다가 다시 붙습니다)")) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: "restart_server" }));
    }
  }

  function fmt(n) {
    return (n ?? 0).toFixed(1);
  }

  function icon(name, cls, color) {
    return `<i data-lucide="${name}" class="${cls}"${color ? ` style="color:${color}"` : ""}></i>`;
  }

  function stepBar() {
    const step = STEPS[screen];
    const pct = Math.round((step.n / STEP_TOTAL) * 100);
    return `
      <div class="step-bar">
        <div class="step-label">STEP ${step.n} · ${step.label} <span class="step-total">/ ${STEP_TOTAL}</span></div>
        <div class="step-track"><div class="step-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }

  function productChip() {
    return `<div class="product-chip" style="background:${product.bg}; color:${product.color}">${icon(product.icon, "icon-sm")} ${product.name}</div>`;
  }

  function render() {
    if (screen === "SELECT") renderSelect();
    else if (screen === "CARD") renderCard();
    else if (screen === "PLACE") renderPlace();
    else if (screen === "REFILL") renderRefill();
    else if (screen === "CHECKOUT") renderCheckout();
    else if (screen === "DONE") renderDone();
    if (window.lucide) lucide.createIcons();
  }

  // 카드 태그 대기 (WAIT_CARD)
  function renderCard() {
    screenEl.innerHTML = `
      ${stepBar()}
      <div class="center">
        <div class="guide">
          리더기에 <b>카드를 태그</b>해주세요.
        </div>
        ${icon("credit-card", "icon-xl", "#3182F6")}
        <div class="badge badge-idle"><span class="dot dot-red"></span> 카드 태그 대기 중</div>
      </div>
    `;
  }

  // 카드 인식 후: 환영 메시지 + 제품 선택
  function renderSelect() {
    screenEl.innerHTML = `
      ${stepBar()}
      <div class="welcome"><span class="welcome-name">${memberName}</span>님<br>환영합니다!</div>
      <div class="welcome-sub">어떤 제품을 리필하시겠어요?</div>
      <div class="product-grid">
        ${PRODUCTS.map(p => `
          <div class="product-card" data-id="${p.id}">
            <div class="product-icon-bg" style="background:${p.bg}">
              ${icon(p.icon, "icon-md", p.color)}
            </div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.pricePerGram}원 / g</div>
          </div>
        `).join("")}
      </div>
    `;
    screenEl.querySelectorAll(".product-card").forEach(card => {
      card.addEventListener("click", () => {
        product = PRODUCTS.find(p => p.id === card.dataset.id);
        screen = "PLACE";
        render();
      });
    });
  }

  // 1단계: 용기 준비 (IDLE)
  function renderPlace() {
    const weight = latest.weight;
    screenEl.innerHTML = `
      ${stepBar()}
      <div class="center">
        ${productChip()}
        <div class="guide">
          빈 용기를 저울 위에 올려주세요.<br>
          올려놓으셨으면 <b>버튼을 눌러주세요</b>.
        </div>
        <div class="big-number ${weight != null ? (latest.stabilized ? 'stable' : 'unstable') : ''}">
          ${weight != null ? fmt(weight) : '--'} <span class="unit">g</span>
        </div>
        <div class="sub">${latest.connected ? (latest.stabilized ? '안정됨' : '측정 중...') : '저울 연결 대기 중...'}</div>
        <div class="badge badge-idle"><span class="dot dot-red"></span> 준비 중 — 버튼을 눌러주세요</div>
      </div>
      <button class="btn btn-secondary" id="back">${icon("arrow-left", "icon-sm")} 제품 다시 선택</button>
    `;
    screenEl.querySelector("#back").addEventListener("click", () => {
      screen = "SELECT";
      product = null;
      render();
    });
  }

  // 2~3단계: 리필 중 (READY)
  function renderRefill() {
    const refill = Math.max(0, latest.refill ?? 0);
    screenEl.innerHTML = `
      ${stepBar()}
      <div class="center">
        ${productChip()}
        <div class="guide">
          원하는 만큼 용기에 담아주세요.<br>
          화면을 보면서 양을 조절하세요.<br>
          다 담으셨으면 <b>버튼을 다시 눌러주세요</b>.
        </div>
        <div class="big-number ${latest.stabilized ? 'stable' : 'unstable'}">
          ${fmt(refill)} <span class="unit">g</span>
        </div>
        <div class="sub">예상 가격: ${Math.round(refill * product.pricePerGram).toLocaleString()}원</div>
        <div class="badge badge-ready"><span class="dot dot-blue"></span> 리필 가능</div>
      </div>
      <button class="btn" id="done">${icon("check", "icon-sm")} 리필 완료</button>
    `;
    screenEl.querySelector("#done").addEventListener("click", () => {
      finalRefill = Math.max(0, latest.refill ?? 0);
      screen = "CHECKOUT";
      render();
    });
  }

  // 4단계: 결제
  function renderCheckout() {
    const price = Math.round(finalRefill * product.pricePerGram);
    screenEl.innerHTML = `
      ${stepBar()}
      <div class="center">
        <div class="guide">리필이 완료되었습니다!</div>
        <div class="receipt">
          <div class="receipt-row"><span>${icon(product.icon, "icon-sm", product.color)} ${product.name}</span><span>${fmt(finalRefill)} g</span></div>
          <div class="receipt-row"><span>단가</span><span>${product.pricePerGram}원 / g</span></div>
          <div class="receipt-total"><span>결제 금액</span><span>${price.toLocaleString()}원</span></div>
        </div>
      </div>
      <button class="btn" id="pay">${icon("credit-card", "icon-sm")} 결제 완료</button>
    `;
    screenEl.querySelector("#pay").addEventListener("click", () => {
      screen = "DONE";
      render();
    });
  }

  // 5단계: 완료 + 탄소 절감
  function renderDone() {
    const co2 = finalRefill * product.co2PerGram;
    screenEl.innerHTML = `
      ${stepBar()}
      <div class="center">
        ${icon("leaf", "icon-xl", "#00C896")}
        <div class="guide">결제가 완료되었습니다.<br>일회용 포장을 줄여서</div>
        <div class="eco-amount">${fmt(co2)} g CO2</div>
        <div class="sub">의 탄소 배출을 줄였어요!</div>
        <div class="sub">이용해주셔서 감사합니다</div>
      </div>
      <button class="btn" id="restart">${icon("rotate-ccw", "icon-sm")} 처음으로</button>
    `;
    screenEl.querySelector("#restart").addEventListener("click", () => {
      screen = "CARD";
      product = null;
      memberName = null;
      finalRefill = 0;
      sendReset();
      render();
    });
  }

  connect();
  render();
</script>
</body>
</html>
